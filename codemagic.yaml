# YessFish iOS-builds via Codemagic (geen Mac nodig)
# Vereist in de Codemagic-UI (eenmalig):
#  1. Integrations > Developer Portal: API-key "yessfish-asc" (gedaan 17-07)
#  2. App > Environment variables: CERTIFICATE_PRIVATE_KEY in groep "appstore_credentials"
#     (RSA-sleutel; origineel op prod-server /root/.codemagic/yessfish_cert_key.pem)
# fetch-signing-files --create maakt het distributiecertificaat en provisioning
# profile automatisch aan in het Apple-developerportaal als ze nog niet bestaan.
workflows:
  ios-testflight:
    name: YessFish iOS - TestFlight
    instance_type: mac_mini_m2
    max_build_duration: 60
    integrations:
      app_store_connect: yessfish-asc
    environment:
      groups:
        - appstore_credentials
      flutter: 3.38.5
    scripts:
      - name: Flutter packages
        script: flutter pub get
      - name: Keychain initialiseren
        script: keychain initialize
      - name: Signing-bestanden ophalen of aanmaken
        script: app-store-connect fetch-signing-files "nl.sbuilder.yessfish" --type IOS_APP_STORE --create
      - name: Certificaten in keychain laden
        script: keychain add-certificates
      - name: Signing toepassen op Xcode-project
        script: xcode-project use-profiles
      - name: IPA bouwen
        script: flutter build ipa --release --export-options-plist=/Users/builder/export_options.plist
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
      email:
        recipients:
          - info@sbuilder.nl
        notify:
          success: true
          failure: true
